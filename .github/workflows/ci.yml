name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Prevents husky from running install hooks in CI
  HUSKY: 0
  # Tells react-scripts test to run once (no watch) and exit
  CI: true
  # Disable blockchain persistence during tests (avoids file I/O side-effects)
  BLOCKCHAIN_PERSISTENCE: false
  SEED_DEMO_DATA: false

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --forceExit

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Smoke-test server start
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:3002/health
          kill $SERVER_PID
